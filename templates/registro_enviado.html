<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud Enviada — Coalfa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:#0f172a;color:#f8fafc;min-height:100vh;display:flex;align-items:center;justify-content:center;}
        .card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:3rem 2.5rem;max-width:440px;width:100%;text-align:center;}
        .icon{font-size:3.5rem;margin-bottom:1.25rem;}
        h1{font-size:1.5rem;font-weight:800;margin-bottom:0.625rem;}
        p{color:#94a3b8;font-size:0.875rem;line-height:1.7;margin-bottom:1.75rem;}
        .btn{display:inline-block;padding:0.8rem 2rem;background:#f97316;color:white;border-radius:10px;text-decoration:none;font-weight:700;font-size:0.875rem;transition:background 0.2s,transform 0.15s;}
        .btn:hover{background:#ea6c0a;transform:translateY(-1px);}
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <h1>Solicitud enviada</h1>
        <p>Tu solicitud fue registrada correctamente. Un administrador revisará tus datos y te asignará el rol correspondiente. Recibirás acceso una vez que sea aprobada.</p>
        <a href="{% url 'login' %}" class="btn">Ir al inicio de sesión</a>
    </div>
</body>
</html>
